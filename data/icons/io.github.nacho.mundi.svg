<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="globe-clip">
      <circle cx="64" cy="64" r="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#613583"/>

  <!-- Globe circle -->
  <circle cx="64" cy="64" r="44" fill="#62a0ea"/>

  <!-- Grid lines clipped to globe -->
  <g clip-path="url(#globe-clip)" opacity="0.35">
    <!-- Meridians -->
    <ellipse cx="64" cy="64" rx="14" ry="44" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <ellipse cx="64" cy="64" rx="32" ry="44" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <!-- Parallels -->
    <line x1="10" y1="48" x2="118" y2="48" stroke="#ffffff" stroke-width="1.2"/>
    <line x1="10" y1="64" x2="118" y2="64" stroke="#ffffff" stroke-width="1.2"/>
    <line x1="10" y1="80" x2="118" y2="80" stroke="#ffffff" stroke-width="1.2"/>
  </g>

  <!-- Globe outline -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#613583" stroke-width="2.5"/>

  <!-- Question mark badge -->
  <g transform="translate(64,58)">
    <rect x="-14" y="-14" width="28" height="28" rx="6" fill="#f5c211" stroke="#e5a50a" stroke-width="1.5"/>
    <text x="0" y="8" font-family="sans-serif" font-weight="bold" font-size="24" fill="#613583" text-anchor="middle">?</text>
  </g>
</svg>
